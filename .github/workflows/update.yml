name: Oceanic Sentinel 自動更新排程

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 檢出程式碼
        uses: actions/checkout@v4

      - name: 2. 設定 Python 環境
        uses: setup-python@v5
        with:
          python-version: '3.9'

      - name: 3. 安裝必要套件
        run: |
          pip install -r requirements.txt

      - name: 4. 執行抓取腳本
        # 重點：讓 Python 的 os.getenv('GFW_TOKEN') 抓得到東西
        env:
          GFW_TOKEN: ${{ secrets.GFW_TOKEN }}
        run: python scraper.py

      - name: 5. 將更新後的資料推回倉庫
        run: |
          git config --local user.name "GitHub Action Bot"
          git config --local user.email "action@github.com"
          git add data.json
          git commit -m "自動更新：魚情、船跡、匯率與油價數據 [$(date)]" || exit 0
          git push
