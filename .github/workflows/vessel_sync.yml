name: OFDC Data Auto Scraper

on:
  schedule:
    - cron: '45 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 檢出代碼
        uses: actions/checkout@v4

      - name: 2. 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 3. 安裝組件
        run: |
          pip install playwright yfinance
          playwright install chromium

      - name: 4. 執行數據抓取 (漁獲 + 金融)
        env:
          OFDC_USER: ${{ secrets.OFDC_USER }}
          OFDC_PASS: ${{ secrets.OFDC_PASS }}
        run: python tracker.py

      - name: 5. 強制同步數據 (解決損壞問題)
        if: success()
        run: |
          git config --global user.name "Vessel-Bot"
          git config --global user.email "bot@example.com"
          
          # 1. 先將產出的 data.json 暫存到本地 commit
          git add data.json
          git commit -m "自動更新數據: $(date)" || echo "無資料變動"
          
          # 2. 拉取遠端，若有衝突，強制以本次抓取的數據 (theirs) 為準
          git pull --rebase -X theirs origin main
          
          # 3. 推送
          git push origin main
