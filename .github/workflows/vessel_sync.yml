name: OFDC Data Auto Scraper

on:
  schedule:
    - cron: '45 0 * * *' # 台北時間每日 08:45 執行
  workflow_dispatch:      # 支援手動執行

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 檢出代碼
        uses: actions/checkout@v4

      - name: 2. 設定 Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 3. 安裝必要組件
        run: |
          pip install playwright yfinance pytz
          playwright install chromium

      - name: 4. 執行全情資抓取
        env:
          OFDC_USER: ${{ secrets.OFDC_USER }}
          OFDC_PASS: ${{ secrets.OFDC_PASS }}
          TZ: 'Asia/Taipei'
        run: python tracker.py

      - name: 5. 強制同步數據回倉庫
        if: success()
        run: |
          git config --global user.name "Vessel-Bot"
          git config --global user.email "bot@example.com"
          git add data.json
          git commit -m "🚀 戰略中心數據更新: $(date)" || echo "No changes"
          git pull --rebase -X theirs origin main
          git push origin main
