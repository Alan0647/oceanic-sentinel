name: OFDC Data Auto Scraper

on:
  schedule:
    # 每日台灣時間 08:45 執行 (UTC 00:45)
    - cron: '45 0 * * *'
  workflow_dispatch:      # 允許在 Actions 頁面手動點擊執行

permissions:
  contents: write         # 授予機器人寫入倉庫的權限

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 檢出代碼 (Checkout)
        uses: actions/checkout@v4

      - name: 2. 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 3. 安裝必要組件 (含金融數據庫)
        run: |
          pip install playwright yfinance
          playwright install chromium

      - name: 4. 執行數據抓取 (漁獲 + 金融)
        env:
          OFDC_USER: ${{ secrets.OFDC_USER }}
          OFDC_PASS: ${{ secrets.OFDC_PASS }}
        run: python tracker.py

      - name: 5. 錯誤截圖上傳 (僅在失敗時觸發)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"

      - name: 6. 同步數據並存回倉庫 (Commit and Push)
        if: success()
        run: |
          git config --global user.name "Vessel-Bot"
          git config --global user.email "bot@example.com"
          
          # 先拉取遠端最新變動，避免 Push 被拒絕
          git pull --rebase origin main
          
          # 加入產出的數據檔案
          git add data.json
          
          # 檢查是否有變動，有的話才提交並推送
          git diff --quiet && git diff --staged --quiet || (git commit -m "自動更新數據回報: $(date)" && git push origin main)
