name: OFDC Data Auto Scraper

on:
  schedule:
    # 每天台灣時間 08:45 (對應 UTC 00:45)
    - cron: '45 0 * * *'
  workflow_dispatch: # 這行非常重要，讓您能在 Actions 頁面手動點選「Run workflow」

# 關鍵設定：授予 GitHub Actions 寫入權限，以便將 data.json 存回您的倉庫
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 檢出代碼 (Checkout)
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安裝必要組件 (Playwright)
        run: |
          pip install playwright
          playwright install chromium

      - name: 執行爬蟲攫取數據
        env:
          # 使用您已設定好的 Secrets
          OFDC_USER: ${{ secrets.OFDC_USER }}
          OFDC_PASS: ${{ secrets.OFDC_PASS }}
        run: python tracker.py

      - name: 將 data.json 存回倉庫 (Commit and Push)
        run: |
          git config --global user.name "Vessel-Bot"
          git config --global user.email "bot@example.com"
          git add data.json
          # 如果資料有變動才提交，避免重複 commit 報錯
          git diff --quiet && git diff --staged --quiet || (git commit -m "自動更新船隻數據: $(date)" && git push)
