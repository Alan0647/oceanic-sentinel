- name: 5. 同步並推送數據 (強制覆蓋衝突模式)
        if: success()
        run: |
          git config --global user.name "Vessel-Bot"
          git config --global user.email "bot@example.com"
          
          # 1. 先將目前的 data.json 暫存
          git add data.json
          git commit -m "暫存最新漁獲數據"
          
          # 2. 拉取遠端更新，若有衝突，強制以機器人的 data.json 為準
          git pull --rebase -X theirs origin main
          
          # 3. 推送回 GitHub
          git push origin main
