- name: 將 data.json 存回倉庫 (Commit and Push)
        if: success()
        run: |
          git config --global user.name "Vessel-Bot"
          git config --global user.email "bot@example.com"
          
          # 1. 先把遠端最新的改動拉下來，並把機器人的數據疊上去
          git pull --rebase origin main
          
          # 2. 檢查是否有資料變動
          git add data.json
          
          # 3. 提交並推送
          git diff --quiet && git diff --staged --quiet || (git commit -m "自動更新船隻數據: $(date)" && git push origin main)
