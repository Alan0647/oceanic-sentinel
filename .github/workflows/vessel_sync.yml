name: OFDC Data Auto Scraper

on:
  schedule:
    - cron: '45 0 * * *' # 台灣時間 08:45 執行
  workflow_dispatch:      # 支援手動執行

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 檢出代碼
        uses: actions/checkout@v4

      - name: 2. 設定 Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 3. 安裝必要組件
        run: |
          pip install playwright yfinance
          playwright install chromium

      - name: 4. 執行數據抓取 (漁獲+金融+油價解析)
        env:
          OFDC_USER: ${{ secrets.OFDC_USER }}
          OFDC_PASS: ${{ secrets.OFDC_PASS }}
        run: python tracker.py

      - name: 5. 同步數據並強制解決衝突
        if: success()
        run: |
          git config --global user.name "Vessel-Bot"
          git config --global user.email "bot@example.com"
          
          # 暫存產出的 data.json
          git add data.json
          git commit -m "自動更新戰略報表: $(date)" || echo "No changes to commit"
          
          # 關鍵：拉取時若有衝突，強制以機器人剛抓到的 data.json 為準
          git pull --rebase -X theirs origin main
          git push origin main
