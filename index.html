<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海洋哨兵 4.1 | 戰略指揮中心</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --navy: #002b5e; --gold: #c5a059; --ofdc-blue: #0070c0; --subtotal-bg: #f2f2f2; }
        body { margin: 0; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: var(--navy); color: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; z-index: 3000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        #menu-btn { background: var(--gold); border: none; padding: 8px 12px; color: white; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #main-view { flex: 1; display: flex; position: relative; }
        #map { flex: 1; z-index: 1; }
        #sidebar { position: absolute; right: 0; top: 0; bottom: 0; width: 360px; background: white; box-shadow: -2px 0 15px rgba(0,0,0,0.3); transition: 0.3s; z-index: 2500; overflow-y: auto; padding: 15px; }
        #sidebar.collapsed { transform: translateX(105%); }
        
        .section-header { border-left: 5px solid var(--gold); padding-left: 10px; color: var(--navy); margin: 15px 0 10px; font-weight: bold; }
        .vessel-card { background: #f8fafb; border-radius: 6px; padding: 10px; margin-bottom: 8px; border: 1px solid #dee2e6; cursor: pointer; transition: 0.2s; }
        .vessel-card:hover { border-color: var(--gold); background: #f0f4f8; }
        .vessel-card b { color: var(--navy); }
        .vessel-card span { float: right; color: var(--ofdc-blue); font-weight: bold; }

        .m-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 20px; }
        .m-table th { text-align: left; border-bottom: 2px solid var(--gold); padding: 5px; }
        .m-table td { padding: 8px 5px; border-bottom: 1px solid #eee; }
        .val-red { color: #d32f2f; font-weight: bold; }

        /* 官方風格漁獲表格 */
        .ofdc-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; border: 1px solid #ccc; }
        .ofdc-table th { background: var(--ofdc-blue); color: white; padding: 8px 4px; border: 1px solid #fff; text-align: center; }
        .ofdc-table td { padding: 6px 4px; border: 1px solid #ccc; text-align: center; }
        .subtotal-row { background: var(--subtotal-bg); font-weight: bold; }

        @media (max-width: 768px) { #sidebar { width: 85%; } }
    </style>
</head>
<body>
<header><div>⚓ <b>海洋哨兵 4.1</b> | 戰略指揮中心</div><button id="menu-btn">選單 ☰</button></header>
<div id="main-view">
    <div id="map"></div>
    <div id="sidebar" class="collapsed">
        <div class="section-header">🚢 艦隊即時位置</div>
        <div id="v-list-top"></div>

        <div class="section-header">📊 金融週報 (一週高低)</div>
        <table class="m-table" id="ex-table"></table>
        <table class="m-table" id="oil-table"></table>
        
        <div class="section-header">🐟 魚場分布預測圖層</div>
        <div style="font-size: 12px; color: #666; padding: 5px;">
            <label><input type="checkbox" checked onchange="toggleL('b')"> 大目鮪分布預測 (18-22°C)</label> <br>
            <label><input type="checkbox" onchange="toggleL('y')"> 黃鰭鮪分布預測 (24-30°C)</label>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([0, 160], 3);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // 海溫 WMS 圖層
    L.tileLayer.wms("https://nowcoast.noaa.gov/arcgis/services/nowcoast/analysis_ocean_sfc_sst_time/MapServer/WmsServer", {
        layers: '1', format: 'image/png', transparent: true, opacity: 0.35
    }).addTo(map);

    document.getElementById('menu-btn').onclick = () => document.getElementById('sidebar').classList.toggle('collapsed');

    async function load() {
        try {
            const res = await fetch('data.json?t=' + Date.now());
            const d = await res.json();
            
            // 1. 渲染金融
            let exH = '<tr><th>幣別對</th><th>最新價</th><th>週最高</th><th>週最低</th></tr>';
            d.market.exchange.forEach(x => exH += `<tr><td><b>${x.name}</b></td><td class="val-red">${x.latest}</td><td>${x.week_h}</td><td>${x.week_l}</td></tr>`);
            document.getElementById('ex-table').innerHTML = exH;

            let oilH = '<tr><th>港口/商品</th><th>最新</th><th>週最高</th><th>週最低</th></tr>';
            d.market.oil.forEach(o => oilH += `<tr><td>${o.name}</td><td class="val-red">${o.latest}</td><td>${o.week_h}</td><td>${o.week_l}</td></tr>`);
            document.getElementById('oil-table').innerHTML = oilH;

            // 2. 渲染艦隊
            const listDiv = document.getElementById('v-list-top');
            let centerShip = null;

            d.vessels.forEach(v => {
                const marker = L.marker([v.lat, v.lon]).addTo(map);
                const popupBody = `
                    <div style="min-width:350px">
                        <b style="color:var(--navy);font-size:14px;">🚢 ${v.name}</b> (${v.date})<br>
                        🌡️ 海溫: ${v.temp}°C | 🍱 餌料: ${v.bait} | 📍 ${v.lat}, ${v.lon}
                        <table class="ofdc-table">
                            <thead>
                                <tr><th>統一編號</th><th>作業日期</th><th>魚種</th><th>重量</th><th>尾數</th><th>處理</th></tr>
                            </thead>
                            <tbody>
                                ${v.catch_details.map(c => `
                                    <tr><td>${c.id}</td><td>${c.date}</td><td>${c.sp}</td><td>${c.wt}</td><td>${c.ct}</td><td>${c.pr}</td></tr>
                                `).join('')}
                                <tr class="subtotal-row">
                                    <td colspan="3" style="text-align:right">當日小計：</td>
                                    <td>${v.subtotal_weight}</td>
                                    <td>${v.subtotal_count}</td>
                                    <td></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                `;
                marker.bindPopup(popupBody);

                const card = document.createElement('div');
                card.className = 'vessel-card';
                card.innerHTML = `<b>${v.name}</b> <span>${v.subtotal_weight} kg</span><br><small>📅 ${v.date} | 📍 ${v.lat}, ${v.lon}</small>`;
                card.onclick = () => { map.setView([v.lat, v.lon], 7); marker.openPopup(); };
                listDiv.appendChild(card);

                // 自動置中昱友 668 (ID: 61508)
                if (v.id === "61508") centerShip = {lat: v.lat, lon: v.lon, marker: marker};
            });

            if (centerShip) {
                map.setView([centerShip.lat, centerShip.lon], 6);
                centerShip.marker.openPopup();
            }
        } catch(e) { console.error("資料載入失敗", e); }
    }
    load();
</script>
</body>
</html>
