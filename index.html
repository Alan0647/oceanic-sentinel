<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海洋哨兵 9.0 | 昱友戰略指揮中心</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --navy: #002b5e; --gold: #c5a059; --ofdc-blue: #0070c0; }
        body { margin: 0; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: var(--navy); color: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; z-index: 3000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        #menu-btn { background: var(--gold); border: none; padding: 8px 12px; color: white; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #main { flex: 1; display: flex; position: relative; overflow: hidden; }
        #map { flex: 1; z-index: 1; }
        #sidebar { position: absolute; right: 0; top: 0; bottom: 0; width: 360px; background: white; box-shadow: -2px 0 15px rgba(0,0,0,0.3); transition: 0.3s; z-index: 2500; overflow-y: auto; padding: 15px; }
        #sidebar.collapsed { transform: translateX(105%); }
        .section-header { border-left: 5px solid var(--gold); padding-left: 10px; color: var(--navy); margin: 20px 0 10px; font-weight: bold; font-size: 1.1rem; }
        .v-card { background: #f8fafb; border-radius: 6px; padding: 10px; margin-bottom: 8px; border: 1px solid #dee2e6; cursor: pointer; }
        .m-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 15px; }
        .m-table td { padding: 8px 5px; border-bottom: 1px solid #eee; }
        .analysis-box { background: #fff9e6; border: 1px solid #ffeeba; padding: 10px; font-size: 11px; color: #856404; border-radius: 5px; margin-bottom: 10px; }
        /* 表格爆框修正 */
        .table-scroll { width: 100%; overflow-x: auto; margin-top: 10px; border: 1px solid #ccc; }
        .c-table { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 430px; }
        .c-table th { background: var(--ofdc-blue); color: white; padding: 8px 4px; border: 1px solid #fff; }
        .c-table td { padding: 6px 4px; border: 1px solid #ccc; text-align: center; }
        .leaflet-popup-content { min-width: 450px !important; }
        @media (max-width: 768px) { #sidebar { width: 85%; } .leaflet-popup-content { min-width: 300px !important; } }
    </style>
</head>
<body>
<header><div>⚓ <b>海洋哨兵 9.0</b></div><button id="menu-btn">選單 ☰</button></header>
<div id="main">
    <div id="map"></div>
    <div id="sidebar">
        <div class="section-header">🚢 艦隊即時位置</div>
        <div id="v-list"></div>
        <div class="section-header">⛽ BunkerIndex 全球燃油</div>
        <div id="oil-list"></div>
        <div class="section-header">💡 Integr8 專家解析</div>
        <div id="oil-analysis" class="analysis-box"></div>
        <div class="section-header">💱 即時匯率</div>
        <table class="m-table" id="ex-table"></table>
    </div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([0, 160], 3);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    const sidebar = document.getElementById('sidebar');
    if (window.innerWidth <= 768) sidebar.classList.add('collapsed');
    document.getElementById('menu-btn').onclick = () => sidebar.classList.toggle('collapsed');

    const oilIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3551/3551525.png', iconSize: [15, 15] });

    async function load() {
        const res = await fetch('data.json?t=' + Date.now());
        const d = await res.json();
        
        document.getElementById('oil-analysis').innerText = d.market.analysis;
        let exH = '<tr><th>幣別對</th><th>最新</th><th>週高</th><th>週低</th></tr>';
        d.market.exchange.forEach(x => exH += `<tr><td><b>${x.name}</b></td><td style="color:red;font-weight:bold">${x.latest}</td><td>${x.week_h}</td><td>${x.week_l}</td></tr>`);
        document.getElementById('ex-table').innerHTML = exH;

        d.market.oil.forEach(o => {
            if (o.lat !== 0) {
                L.marker([o.lat, o.lon], { icon: oilIcon }).addTo(map).bindPopup(`<b>⛽ ${o.name}</b><br>MGO: $${o.latest}<br>Date: ${o.date}`);
            }
            const card = document.createElement('div');
            card.className = 'v-card'; card.style.borderColor = '#eee';
            card.innerHTML = `<b>${o.name.split('(')[0]}</b> <span style="float:right;color:red">$${o.latest}</span><br><small>${o.fuel} | ${o.date}</small>`;
            card.onclick = () => { if(o.lat !== 0) map.setView([o.lat, o.lon], 7); };
            document.getElementById('oil-list').appendChild(card);
        });

        d.vessels.forEach(v => {
            const m = L.marker([v.lat, v.lon]).addTo(map);
            const popup = `
                <div style="min-width:430px">
                    <b style="color:var(--navy)">🚢 ${v.name}</b> (${v.date})<br>
                    🌡️ 海溫: ${v.temp}°C | 🍱 餌料: ${v.bait} | 📍 ${v.lat}, ${v.lon}
                    <div class="table-scroll"><table class="c-table">
                        <thead><tr><th>統一編號</th><th>日期</th><th>魚種</th><th>重量</th><th>尾數</th><th>處理</th></tr></thead>
                        <tbody>${v.catch_details.map(c => `<tr><td>${c.id}</td><td>${c.date}</td><td>${c.sp}</td><td>${c.wt}</td><td>${c.ct}</td><td>${c.pr}</td></tr>`).join('')}
                        <tr style="background:#f2f2f2;font-weight:bold"><td colspan="3" style="text-align:right">當日小計：</td><td>${v.subtotal_weight}</td><td>${v.subtotal_count}</td><td></td></tr>
                        </tbody></table></div></div>`;
            m.bindPopup(popup, { maxWidth: 500 });
            const card = document.createElement('div');
            card.className = 'v-card';
            card.innerHTML = `<b>${v.name}</b> <span style="float:right">${v.subtotal_weight} kg</span><br><small>📅 ${v.date}</small>`;
            card.onclick = () => { map.setView([v.lat, v.lon], 7); m.openPopup(); };
            document.getElementById('v-list').appendChild(card);
            if (v.id === "61508") { map.setView([v.lat, v.lon], 6); m.openPopup(); }
        });
    }
    load();
</script>
</body>
</html>
