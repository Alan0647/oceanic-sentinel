<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海洋哨兵 4.0 | 戰略指揮中心</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --navy: #002b5e; --gold: #c5a059; --ofdc-blue: #0070c0; }
        body { margin: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: var(--navy); color: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; z-index: 3000; }
        #menu-btn { background: var(--gold); border: none; padding: 8px 12px; color: white; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #main { flex: 1; display: flex; position: relative; }
        #map { flex: 1; z-index: 1; }
        #sidebar { position: absolute; right: 0; top: 0; bottom: 0; width: 360px; background: white; box-shadow: -2px 0 15px rgba(0,0,0,0.3); transition: 0.3s; z-index: 2500; overflow-y: auto; padding: 15px; }
        #sidebar.collapsed { transform: translateX(105%); }
        .section-header { border-left: 5px solid var(--gold); padding-left: 10px; color: var(--navy); margin: 15px 0 10px; font-weight: bold; }
        .v-card { background: #f8fafb; border-radius: 6px; padding: 10px; margin-bottom: 8px; border: 1px solid #dee2e6; cursor: pointer; }
        .m-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 20px; }
        .m-table td { padding: 6px; border-bottom: 1px solid #eee; }
        /* 官方表格還原 */
        .c-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; border: 1px solid #ccc; }
        .c-table th { background: var(--ofdc-blue); color: white; padding: 8px 4px; border: 1px solid #fff; }
        .c-table td { padding: 6px 4px; border: 1px solid #ccc; text-align: center; }
        .subtotal { background: #f2f2f2; font-weight: bold; }
    </style>
</head>
<body>
<header><div>⚓ <b>海洋哨兵 4.0</b></div><button id="menu-btn">選單 ☰</button></header>
<div id="main">
    <div id="map"></div>
    <div id="sidebar" class="collapsed">
        <div class="section-header">🚢 艦隊即時位置</div>
        <div id="v-list"></div>
        <div class="section-header">📊 金融週報 (一週高低)</div>
        <table class="m-table" id="ex-table"></table>
        <table class="m-table" id="oil-table"></table>
    </div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([0, 160], 3);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    document.getElementById('menu-btn').onclick = () => document.getElementById('sidebar').classList.toggle('collapsed');

    async function load() {
        const res = await fetch('data.json?t=' + Date.now());
        const d = await res.json();
        
        // 金融
        let exH = '<tr><th>幣別對</th><th>最新</th><th>週高</th><th>週低</th></tr>';
        d.market.exchange.forEach(x => exH += `<tr><td><b>${x.name}</b></td><td style="color:red;font-weight:bold">${x.latest}</td><td>${x.week_h}</td><td>${x.week_l}</td></tr>`);
        document.getElementById('ex-table').innerHTML = exH;

        // 艦隊
        const list = document.getElementById('v-list');
        d.vessels.forEach(v => {
            const m = L.marker([v.lat, v.lon]).addTo(map);
            const popup = `
                <div style="min-width:350px">
                    <b style="color:var(--navy)">🚢 ${v.name}</b> (${v.date})<br>
                    🌡️ 海溫: ${v.temp}°C | 🍱 餌料: ${v.bait} | 📍 ${v.lat}, ${v.lon}
                    <table class="c-table">
                        <thead><tr><th>統一編號</th><th>日期</th><th>魚種</th><th>重量</th><th>尾數</th><th>處理</th></tr></thead>
                        <tbody>
                            ${v.catch_details.map(c => `<tr><td>${c.id}</td><td>${c.date}</td><td>${c.sp}</td><td>${c.wt}</td><td>${c.ct}</td><td>${c.pr}</td></tr>`).join('')}
                            <tr class="subtotal"><td colspan="3" style="text-align:right">當日小計：</td><td>${v.subtotal_weight}</td><td>${v.subtotal_count}</td><td></td></tr>
                        </tbody>
                    </table>
                </div>`;
            m.bindPopup(popup);
            const card = document.createElement('div');
            card.className = 'v-card';
            card.innerHTML = `<b>${v.name}</b> <span style="float:right">${v.subtotal_weight} kg</span>`;
            card.onclick = () => { map.setView([v.lat, v.lon], 7); m.openPopup(); };
            list.appendChild(card);
            if (v.id === "61508") { map.setView([v.lat, v.lon], 6); m.openPopup(); }
        });
    }
    load();
</script>
</body>
</html>
