<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海洋哨兵 3.5 | 科學指揮中心</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --navy: #002b5e; --gold: #c5a059; --blue: #0056b3; }
        body { margin: 0; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: var(--navy); color: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; z-index: 3000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        #menu-btn { background: var(--gold); border: none; padding: 8px 12px; color: white; border-radius: 4px; cursor: pointer; }
        #main-view { flex: 1; display: flex; position: relative; }
        #map { flex: 1; z-index: 1; }
        #sidebar { position: absolute; right: 0; top: 0; bottom: 0; width: 360px; background: white; box-shadow: -2px 0 15px rgba(0,0,0,0.3); transition: 0.3s; z-index: 2500; overflow-y: auto; padding: 15px; }
        #sidebar.collapsed { transform: translateX(105%); }
        .m-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 20px; }
        .m-table th { text-align: left; border-bottom: 2px solid var(--gold); padding: 6px; }
        .m-table td { padding: 8px 6px; border-bottom: 1px solid #eee; }
        .c-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        .c-table th { background: var(--blue); color: white; padding: 6px; }
        .c-table td { border: 1px solid #eee; padding: 6px; text-align: center; }
        .depth-box { background: #eef7ff; padding: 10px; border-radius: 5px; border-left: 4px solid var(--blue); margin: 5px 0; font-size: 12px; }
        @media (max-width: 768px) { #sidebar { width: 85%; } }
    </style>
</head>
<body>
<header><div>⚓ <b>海洋哨兵 3.5</b></div><button id="menu-btn">戰略面板 ☰</button></header>
<div id="main-view">
    <div id="map"></div>
    <div id="sidebar" class="collapsed">
        <h3 style="color:var(--navy)">🎯 魚種分布預測篩選</h3>
        <div style="background:#f9f9f9; padding:10px; border-radius:5px;">
            <input type="checkbox" id="bigeye-check" checked onchange="filterVessels()"> 大目鮪 (18-22°C)<br>
            <input type="checkbox" id="yellowfin-check" checked onchange="filterVessels()"> 黃鰭鮪 (24-30°C)
        </div>
        <h3 style="color:var(--navy)">📊 金融週報 (一週高低)</h3>
        <table class="m-table" id="ex-table"></table>
        <table class="m-table" id="oil-table"></table>
        <h3 style="color:var(--navy)">🚢 即時位置與建議</h3>
        <div id="v-list"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([0, 160], 3);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // [新增] 衛星海溫圖層 (WMS)
    const sstLayer = L.tileLayer.wms("https://nowcoast.noaa.gov/arcgis/services/nowcoast/analysis_ocean_sfc_sst_time/MapServer/WmsServer", {
        layers: '1', format: 'image/png', transparent: true, opacity: 0.4
    }).addTo(map);

    document.getElementById('menu-btn').onclick = () => document.getElementById('sidebar').classList.toggle('collapsed');

    let allData = [];
    let markers = [];

    async function load() {
        const res = await fetch('data.json?t=' + Date.now());
        const d = await res.json();
        allData = d.vessels;

        // 渲染金融
        let exH = '<tr><th>幣別</th><th>最新</th><th>週高/低</th></tr>';
        d.market.exchange.forEach(x => exH += `<tr><td>${x.name}</td><td style="color:red"><b>${x.latest}</b></td><td>H:${x.week_h}<br>L:${x.week_l}</td></tr>`);
        document.getElementById('ex-table').innerHTML = exH;

        let oilH = '<tr><th>港口</th><th>最新</th><th>週高/低</th></tr>';
        d.market.oil.forEach(o => oilH += `<tr><td>${o.name}</td><td style="color:red"><b>${o.latest}</b></td><td>H:${o.week_h}<br>L:${o.week_l}</td></tr>`);
        document.getElementById('oil-table').innerHTML = oilH;

        filterVessels();
    }

    function filterVessels() {
        markers.forEach(m => map.removeLayer(m));
        markers = [];
        const showBigeye = document.getElementById('bigeye-check').checked;
        const showYellowfin = document.getElementById('yellowfin-check').checked;

        allData.forEach(v => {
            const temp = parseFloat(v.temp);
            let match = false;
            if (showBigeye && temp <= 23) match = true;
            if (showYellowfin && temp >= 24) match = true;

            if (match) {
                const m = L.marker([v.lat, v.lon]).addTo(map);
                m.bindPopup(`
                    <div style="min-width:300px">
                        <b style="color:var(--navy)">🚢 ${v.name}</b> (${v.date})<br>
                        🌡️ 海溫: ${v.temp}°C | 🍱 餌料: ${v.bait}<br>
                        🌊 SSHA: ${v.env.ssha} (${v.env.eddy_type})
                        <div class="depth-box">💡 <b>深度決策參考：</b><br>預測躍溫層介於 ${v.env.thermocline}，建議勾深增加投數。</div>
                        <table class="c-table">
                            <thead><tr><th>魚種</th><th>重量</th><th>尾數</th><th>處理</th></tr></thead>
                            <tbody>${v.catch_details.map(c => `<tr><td>${c.sp}</td><td>${c.wt}</td><td>${c.ct}</td><td>${c.pr}</td></tr>`).join('')}</tbody>
                        </table>
                    </div>
                `);
                markers.push(m);
            }
        });
    }
    load();
</script>
</body>
</html>
