<style>
    /* 側邊欄收摺動畫 */
    #sidebar {
        position: fixed; right: 0; top: 0; bottom: 0; width: 350px;
        background: white; box-shadow: -2px 0 10px rgba(0,0,0,0.1);
        transition: 0.3s; z-index: 2000; padding: 15px; overflow-y: auto;
    }
    #sidebar.collapsed { right: -350px; }
    
    /* 側邊欄切換按鈕 */
    #toggle-btn {
        position: fixed; right: 350px; top: 20px;
        background: var(--navy); color: white; border: none;
        padding: 10px; border-radius: 5px 0 0 5px; cursor: pointer;
        transition: 0.3s; z-index: 2001;
    }
    #sidebar.collapsed + #toggle-btn { right: 0; }

    /* 匯率與油價表格 (對標您的截圖) */
    .finance-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 20px; }
    .finance-table th { text-align: left; padding: 8px; border-bottom: 2px solid var(--navy); }
    .finance-table td { padding: 8px; border-bottom: 1px solid #eee; }
    .val-latest { font-weight: bold; color: #d32f2f; }
    .val-note { font-size: 11px; color: #666; }
</style>

<button id="toggle-btn">選單 ☰</button>
<div id="sidebar">
    <h3 style="color:var(--navy)">💱 金融週報 (一週高/低)</h3>
    <table class="finance-table" id="exchange-content">
        </table>

    <h3 style="color:var(--navy)">⛽ 全球油價追蹤</h3>
    <table class="finance-table" id="oil-content">
        </table>
    
    <hr>
    <h3 style="color:var(--navy)">🚢 艦隊清單</h3>
    <div id="vessel-list"></div>
</div>

<script>
    // 渲染金融數據
    function renderFinance(market) {
        const exTable = document.getElementById('exchange-content');
        exTable.innerHTML = '<tr><th>幣別</th><th>最新價</th><th>週高/低</th></tr>';
        market.exchange.forEach(ex => {
            exTable.innerHTML += `
                <tr>
                    <td>${ex.name}</td>
                    <td class="val-latest">${ex.latest}</td>
                    <td class="val-note">H: ${ex.week_h}<br>L: ${ex.week_l}</td>
                </tr>`;
        });

        const oilTable = document.getElementById('oil-content');
        oilTable.innerHTML = '<tr><th>港口/商品</th><th>最新</th><th>週高/低</th></tr>';
        market.oil.forEach(o => {
            oilTable.innerHTML += `
                <tr>
                    <td>${o.name}</td>
                    <td class="val-latest">${o.latest}</td>
                    <td class="val-note">H: ${o.week_h} / L: ${o.week_l}</td>
                </tr>`;
        });
    }

    // 側邊欄切換邏輯
    document.getElementById('toggle-btn').onclick = function() {
        document.getElementById('sidebar').classList.toggle('collapsed');
    };
</script>
