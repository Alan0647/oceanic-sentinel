<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海洋哨兵 3.0 | 戰略指揮系統</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --navy: #002b5e; --gold: #c5a059; --blue: #0056b3; }
        body { margin: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: var(--navy); color: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; z-index: 3000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        #menu-btn { background: var(--gold); border: none; padding: 8px 12px; color: white; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        #main-view { flex: 1; display: flex; position: relative; }
        #map { flex: 1; z-index: 1; }
        
        /* 側邊欄樣式 */
        #sidebar { 
            position: absolute; right: 0; top: 0; bottom: 0; width: 360px; 
            background: white; box-shadow: -2px 0 15px rgba(0,0,0,0.3); 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2500; overflow-y: auto; padding: 15px;
        }
        #sidebar.collapsed { transform: translateX(105%); }

        /* 金融表格 */
        .m-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 20px; }
        .m-table th { text-align: left; border-bottom: 2px solid var(--gold); padding: 6px; color: #444; }
        .m-table td { padding: 8px 6px; border-bottom: 1px solid #eee; }
        .val-red { color: #d32f2f; font-weight: bold; }
        .val-week { font-size: 10px; color: #666; line-height: 1.2; }

        /* 漁獲表格 (還原藍色標題格式) */
        .c-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
        .c-table th { background: var(--blue); color: white; border: 1px solid #ccc; padding: 6px; }
        .c-table td { border: 1px solid #eee; padding: 6px; text-align: center; }

        @media (max-width: 768px) { #sidebar { width: 85%; } }
    </style>
</head>
<body>
<header>
    <div>⚓ <b>海洋哨兵 3.0</b> | 昱友企業</div>
    <button id="menu-btn">市場數據 ☰</button>
</header>
<div id="main-view">
    <div id="map"></div>
    <div id="sidebar" class="collapsed">
        <h3 style="color:var(--navy); border-left: 4px solid var(--gold); padding-left: 10px;">📊 金融週報</h3>
        <table class="m-table" id="ex-table"></table>
        <table class="m-table" id="oil-table"></table>
        
        <h3 style="color:var(--navy); border-left: 4px solid var(--gold); padding-left: 10px;">🐟 魚場分布預測</h3>
        <div style="font-size: 13px; padding: 10px; background: #f9f9f9; border-radius: 5px;">
            <label><input type="checkbox" checked onchange="toggleL('b')"> 大目鮪預測區 (橘)</label><br>
            <label><input type="checkbox" onchange="toggleL('y')"> 黃鰭鮪預測區 (黃)</label>
        </div>

        <h3 style="color:var(--navy); border-left: 4px solid var(--gold); padding-left: 10px;">🚢 艦隊即時位置</h3>
        <div id="v-list" style="font-size: 13px;"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([0, 160], 3);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // 模擬魚場預測分布
    const layers = {
        b: L.circle([2, 158], {radius: 900000, color: 'orange', fillOpacity: 0.15}).addTo(map),
        y: L.circle([-5, 165], {radius: 700000, color: 'yellow', fillOpacity: 0.15})
    };
    function toggleL(n) { map.hasLayer(layers[n]) ? map.removeLayer(layers[n]) : layers[n].addTo(map); }

    document.getElementById('menu-btn').onclick = () => document.getElementById('sidebar').classList.toggle('collapsed');

    async function load() {
        try {
            const res = await fetch('data.json?t=' + Date.now());
            const d = await res.json();

            // 匯率
            let exH = '<tr><th>幣別對</th><th>最新</th><th>一週高/低</th></tr>';
            d.market.exchange.forEach(x => {
                exH += `<tr><td><b>${x.name}</b></td><td class="val-red">${x.latest}</td><td class="val-week">H: ${x.week_h}<br>L: ${x.week_l}</td></tr>`;
            });
            document.getElementById('ex-table').innerHTML = exH;

            // 油價
            let oilH = '<tr><th>港口/商品</th><th>最新</th><th>一週高/低</th></tr>';
            d.market.oil.forEach(o => {
                oilH += `<tr><td>${o.name}</td><td class="val-red">${o.latest}</td><td class="val-week">H: ${o.week_h}<br>L: ${o.week_l}</td></tr>`;
            });
            document.getElementById('oil-data').innerHTML = oilH;

            // 船位彈窗
            d.vessels.forEach(v => {
                const marker = L.marker([v.lat, v.lon]).addTo(map);
                marker.bindPopup(`
                    <div style="min-width:280px">
                        <b style="color:var(--navy);font-size:14px;">🚢 ${v.name}</b> (${v.date})<br>
                        🌡️ 海溫: ${v.temp}°C | 🍱 餌料: ${v.bait}
                        <table class="c-table">
                            <thead><tr><th>魚種</th><th>重量</th><th>尾數</th><th>處理</th></tr></thead>
                            <tbody>${v.catch_details.map(c => `<tr><td>${c.sp}</td><td>${c.wt}</td><td>${c.ct}</td><td>${c.pr}</td></tr>`).join('')}</tbody>
                        </table>
                    </div>
                `);
            });
        } catch(e) { console.error("資料載入失敗", e); }
    }
    load();
</script>
</body>
</html>
