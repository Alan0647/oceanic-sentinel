<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海洋哨兵 2.0 | 昱友/信隆 決策監控中心</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #002b5e; --gold: #c5a059; --light: #f4f7f6; }
        body, html { height: 100%; margin: 0; font-family: 'Noto Sans TC', sans-serif; display: flex; flex-direction: column; }
        
        /* 頂部導覽 */
        header { background: var(--navy); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        
        /* 主體佈局 */
        #main-container { display: flex; flex: 1; overflow: hidden; }
        
        /* 左側地圖 */
        #map { flex: 1; z-index: 1; }

        /* 右側資訊欄 */
        #sidebar { width: 350px; background: white; border-left: 1px solid #ddd; overflow-y: auto; padding: 15px; }
        
        .section-title { color: var(--navy); border-left: 4px solid var(--gold); padding-left: 10px; margin: 20px 0 10px; font-weight: bold; }
        
        /* 油價卡片 */
        .price-card { background: #f9f9f9; padding: 10px; border-radius: 6px; margin-bottom: 8px; border: 1px solid #eee; font-size: 0.9rem; }
        .price-val { float: right; font-weight: bold; color: #d32f2f; }

        /* 漁獲詳情彈窗 */
        .detail-popup { min-width: 250px; font-size: 0.85rem; }
        .detail-table { width: 100%; border-collapse: collapse; margin-top: 5px; }
        .detail-table th { background: #eee; text-align: left; }
        .detail-table td, .detail-table th { border: 1px solid #ddd; padding: 4px; }
    </style>
</head>
<body>

<header>
    <div>⚓ <b>海洋哨兵 2.0</b> | 艦隊監控中心</div>
    <div id="sync-time" style="font-size: 0.8rem; opacity: 0.8;">同步中...</div>
</header>

<div id="main-container">
    <div id="map"></div>
    
    <div id="sidebar">
        <div class="section-title">今日油價 & 匯率</div>
        <div id="oil-prices">
            <div class="price-card">WTI 輕原油 <span class="price-val">讀取中...</span></div>
            <div class="price-card">新加坡 MGO <span class="price-val">讀取中...</span></div>
            <div class="price-card">高雄 MGO <span class="price-val">讀取中...</span></div>
        </div>

        <div class="section-title">魚場分布預測</div>
        <div class="price-card" style="background: #e3f2fd; border-color: #bbdefb;">
            💡 <b>目前預測：</b> 索羅門群島東部海域海溫偏高 (28°C)，大目鮪活躍度預期上升。
        </div>

        <div class="section-title">艦隊清單 (點擊追蹤)</div>
        <div id="vessel-list"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([0, 160], 3); // 以西太平洋為中心
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    async function initDashboard() {
        const response = await fetch('data.json?t=' + new Date().getTime());
        const data = await response.json();
        const vesselList = document.getElementById('vessel-list');
        
        document.getElementById('sync-time').innerText = "雲端同步：" + data[0].update_time;

        data.forEach(vessel => {
            // 1. 在地圖標註位置
            const marker = L.marker([vessel.lat, vessel.lon]).addTo(map);
            
            // 2. 建立漁獲詳情 HTML
            let catchHtml = `
                <div class="detail-popup">
                    <b>🚢 ${vessel.name}</b> (${vessel.date})<br>
                    🌡️ 海溫: ${vessel.sea_temp}°C | 🍱 餌料: ${vessel.bait}<br>
                    <table class="detail-table">
                        <tr><th>魚種</th><th>重量</th><th>尾數</th><th>處理</th></tr>
                        ${vessel.catch_details.map(c => `
                            <tr><td>${c.species}</td><td>${c.weight}</td><td>${c.count}</td><td>${c.process}</td></tr>
                        `).join('')}
                    </table>
                </div>
            `;
            marker.bindPopup(catchHtml);

            // 3. 側邊欄清單
            const item = document.createElement('div');
            item.className = 'price-card';
            item.style.cursor = 'pointer';
            item.innerHTML = `<b>${vessel.name}</b> <span style="float:right">${vessel.total_weight} kg</span>`;
            item.onclick = () => {
                map.setView([vessel.lat, vessel.lon], 6);
                marker.openPopup();
            };
            vesselList.appendChild(item);
        });
    }

    // 模擬油價 (之後可透過 API 串接)
    function loadOilPrices() {
        // 這部分可根據您週報的 MGO 報價手動更新或寫入 JSON
        document.getElementById('oil-prices').innerHTML = `
            <div class="price-card">WTI 輕原油 <span class="price-val">USD 81.2</span></div>
            <div class="price-card">新加坡 MGO <span class="price-val">USD 745</span></div>
            <div class="price-card">高雄 MGO <span class="price-val">USD 760</span></div>
            <div class="price-card">釜山 MGO <span class="price-val">USD 755</span></div>
        `;
    }

    initDashboard();
    loadOilPrices();
</script>
</body>
</html>
