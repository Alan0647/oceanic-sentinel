<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海洋哨兵 3.0 | 戰略決策監控</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --navy: #002b5e; --gold: #c5a059; --blue: #007bff; }
        body { margin: 0; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { background: var(--navy); color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; z-index: 2000; }

        /* 手機版側邊欄開關 */
        #menu-toggle { display: none; background: var(--gold); border: none; padding: 8px 12px; color: white; border-radius: 4px; cursor: pointer; }

        #container { display: flex; flex: 1; position: relative; overflow: hidden; }
        
        /* 地圖全滿 */
        #map { flex: 1; height: 100%; z-index: 1; }

        /* 側邊欄：支援收放 */
        #sidebar { 
            width: 380px; background: white; border-left: 1px solid #ccc; 
            transition: 0.3s; z-index: 1500; overflow-y: auto; padding: 15px; 
        }
        
        /* 側邊欄隱藏樣式 */
        #sidebar.hidden { margin-right: -380px; }

        /* 漁獲明細表格還原 (對標截圖 1773894499103) */
        .catch-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
        .catch-table th { background: var(--blue); color: white; border: 1px solid #ddd; padding: 6px; }
        .catch-table td { border: 1px solid #ddd; padding: 6px; text-align: center; }
        .catch-table tr:nth-child(even) { background: #f2f9ff; }

        /* 市場報價表格 (對標截圖 1773894805792) */
        .market-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 20px; }
        .market-table th { text-align: left; color: #666; border-bottom: 1px solid #ddd; padding: 5px; }
        .market-table td { padding: 8px 5px; border-bottom: 1px solid #eee; }
        .val-red { color: #d32f2f; font-weight: bold; }

        @media (max-width: 768px) {
            #menu-toggle { display: block; }
            #sidebar { position: absolute; right: 0; height: 100%; width: 85%; }
            #sidebar.hidden { right: -100%; }
        }
    </style>
</head>
<body>

<header>
    <div>⚓ <b>海洋哨兵 3.0</b></div>
    <button id="menu-toggle">選單 ☰</button>
</header>

<div id="container">
    <div id="map"></div>
    <div id="sidebar" class="hidden"> <h3 style="color:var(--navy);border-bottom:2px solid var(--gold)">市場金融即時報價</h3>
        <table class="market-table" id="exchange-table">
            <tr><th>幣別對</th><th>最新</th><th>週最高</th><th>週最低</th></tr>
        </table>
        
        <table class="market-table" id="oil-table">
            <tr><th>商品 / 港口</th><th>最新</th><th>週高</th><th>週低</th></tr>
        </table>

        <h3 style="color:var(--navy);border-bottom:2px solid var(--gold)">魚場分佈預測圖層</h3>
        <div>
            <input type="checkbox" id="layer-bigeye" checked> 大目鮪 <br>
            <input type="checkbox" id="layer-yellowfin"> 黃鰭鮪 <br>
            <input type="checkbox" id="layer-albacore"> 長鰭鮪
        </div>

        <h3 style="color:var(--navy);border-bottom:2px solid var(--gold)">艦隊即時清單</h3>
        <div id="vessel-list"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 1. 初始化地圖與魚場預測圖層 (Heatmap 模擬)
    const map = L.map('map').setView([0, 160], 3);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // 模擬魚場圖層 (使用圓形半透明覆蓋)
    const bigeyeLayer = L.circle([5, 155], { radius: 1000000, color: 'orange', fillOpacity: 0.2 }).bindTooltip("大目鮪預測集中區");
    bigeyeLayer.addTo(map);

    // 2. 處理側邊欄收放
    document.getElementById('menu-toggle').onclick = () => {
        document.getElementById('sidebar').classList.toggle('hidden');
    };

    // 3. 讀取數據並渲染
    async function loadData() {
        const res = await fetch('data.json');
        const d = await res.json();

        // 渲染匯率 (含週高低點備註)
        const exTable = document.getElementById('exchange-table');
        d.market.exchange.forEach(ex => {
            exTable.innerHTML += `<tr><td>${ex.pair}</td><td class="val-red">${ex.latest}</td><td>${ex.week_h}</td><td>${ex.week_l}</td></tr>`;
        });

        // 渲染油價 (11個港口對標截圖)
        const oilTable = document.getElementById('oil-table');
        d.market.oil.forEach(o => {
            oilTable.innerHTML += `<tr><td>${o.port}</td><td class="val-red">${o.latest}</td><td>${o.week_h}</td><td>${o.week_l}</td></tr>`;
        });

        // 渲染船位與還原漁獲表格 (截圖 1773894499103 模式)
        d.vessels.forEach(v => {
            const marker = L.marker([v.lat, v.lon]).addTo(map);
            const popupHtml = `
                <div style="min-width:300px">
                    <b>🚢 ${v.name}</b> 作業資訊<br>
                    🌡️ 海溫: ${v.sea_temp}°C | 🍱 餌料: ${v.bait}
                    <table class="catch-table">
                        <thead><tr><th>魚種</th><th>重量</th><th>尾數</th><th>處理</th></tr></thead>
                        <tbody>
                            ${v.catch_details.map(c => `
                                <tr><td>${c.species}</td><td>${c.weight}</td><td>${c.count}</td><td>${c.process}</td></tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
            marker.bindPopup(popupHtml);
        });
    }

    loadData();
</script>
</body>
</html>
